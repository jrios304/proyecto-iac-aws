<svg width="680" height="740" viewBox="0 0 680 740" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="14" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Arquitectura AWS - Infraestructura Segura</text>
  <!-- Internet -->
  <rect x="270" y="24" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Internet</text>
  <text x="340" y="59" text-anchor="middle" font-size="11" fill="#5F5E5A">trafico entrante</text>
  <!-- WAF -->
  <rect x="255" y="104" width="170" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="123" text-anchor="middle" font-size="12" font-weight="bold" fill="#791F1F">AWS WAF</text>
  <text x="340" y="139" text-anchor="middle" font-size="11" fill="#A32D2D">OWASP + rate limit</text>
  <line x1="340" y1="68" x2="340" y2="102" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- ALB -->
  <rect x="255" y="184" width="170" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="203" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Elastic Load Balancer</text>
  <text x="340" y="219" text-anchor="middle" font-size="11" fill="#185FA5">distribuye trafico</text>
  <line x1="340" y1="148" x2="340" y2="182" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- VPC container -->
  <rect x="20" y="264" width="640" height="368" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="340" y="286" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">VPC  10.0.0.0/16</text>
  <!-- ALB to VPC -->
  <path d="M340 228 L340 264" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Subred publica -->
  <rect x="36" y="300" width="290" height="96" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="181" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#04342C">Subred publica</text>
  <text x="181" y="336" text-anchor="middle" font-size="11" fill="#085041">10.0.1.0/24  10.0.3.0/24</text>
  <!-- NAT GW -->
  <rect x="56" y="352" width="120" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="116" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">NAT Gateway</text>
  <text x="116" y="380" text-anchor="middle" font-size="10" fill="#854F0B">salida a internet</text>
  <!-- IGW -->
  <rect x="196" y="352" width="120" height="36" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="256" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">Internet Gateway</text>
  <text x="256" y="380" text-anchor="middle" font-size="10" fill="#5F5E5A">conecta internet</text>
  <!-- Subred privada -->
  <rect x="354" y="300" width="290" height="96" rx="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="499" y="320" text-anchor="middle" font-size="12" font-weight="bold" fill="#04342C">Subred privada</text>
  <text x="499" y="336" text-anchor="middle" font-size="11" fill="#085041">10.0.2.0/24</text>
  <!-- EC2 -->
  <rect x="374" y="352" width="120" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="434" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">EC2  t3.micro</text>
  <text x="434" y="380" text-anchor="middle" font-size="10" fill="#534AB7">Amazon Linux 2023</text>
  <!-- ASG -->
  <rect x="514" y="352" width="120" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="574" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#3C3489">Auto Scaling</text>
  <text x="574" y="380" text-anchor="middle" font-size="10" fill="#534AB7">min 1  max 3</text>
  <!-- ALB to private subnet -->
  <path d="M390 228 L499 228 L499 264" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <!-- Security row -->
  <rect x="36" y="428" width="160" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="116" y="446" text-anchor="middle" font-size="11" font-weight="bold" fill="#791F1F">Security Groups</text>
  <text x="116" y="462" text-anchor="middle" font-size="10" fill="#A32D2D">ALB y EC2 aislados</text>
  <rect x="212" y="428" width="130" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="277" y="446" text-anchor="middle" font-size="11" font-weight="bold" fill="#791F1F">Network ACLs</text>
  <text x="277" y="462" text-anchor="middle" font-size="10" fill="#A32D2D">nivel de subred</text>
  <rect x="358" y="428" width="120" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="418" y="446" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">IAM Role</text>
  <text x="418" y="462" text-anchor="middle" font-size="10" fill="#854F0B">min privilegio</text>
  <rect x="494" y="428" width="148" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="568" y="446" text-anchor="middle" font-size="11" font-weight="bold" fill="#633806">KMS</text>
  <text x="568" y="462" text-anchor="middle" font-size="10" fill="#854F0B">cifrado datos</text>
  <!-- Monitoring row -->
  <rect x="36" y="490" width="120" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="96" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#27500A">CloudTrail</text>
  <text x="96" y="524" text-anchor="middle" font-size="10" fill="#3B6D11">auditoria acciones</text>
  <rect x="172" y="490" width="140" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="242" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#27500A">CloudWatch</text>
  <text x="242" y="524" text-anchor="middle" font-size="10" fill="#3B6D11">4 alarmas activas</text>
  <rect x="328" y="490" width="130" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="393" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#27500A">GuardDuty</text>
  <text x="393" y="524" text-anchor="middle" font-size="10" fill="#3B6D11">deteccion amenazas</text>
  <rect x="474" y="490" width="168" height="44" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="558" y="508" text-anchor="middle" font-size="11" font-weight="bold" fill="#27500A">AWS Config</text>
  <text x="558" y="524" text-anchor="middle" font-size="10" fill="#3B6D11">cumplimiento politicas</text>
  <!-- Storage row -->
  <rect x="36" y="552" width="130" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="101" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">S3 buckets</text>
  <text x="101" y="586" text-anchor="middle" font-size="10" fill="#5F5E5A">cifrados + lock</text>
  <rect x="182" y="552" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="257" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">Secrets Manager</text>
  <text x="257" y="586" text-anchor="middle" font-size="10" fill="#5F5E5A">credenciales seguras</text>
  <rect x="348" y="552" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="403" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">SNS</text>
  <text x="403" y="586" text-anchor="middle" font-size="10" fill="#5F5E5A">alertas por email</text>
  <rect x="474" y="552" width="168" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="558" y="570" text-anchor="middle" font-size="11" font-weight="bold" fill="#2C2C2A">VPC Flow Logs</text>
  <text x="558" y="586" text-anchor="middle" font-size="10" fill="#5F5E5A">trafico de red</text>
  <!-- Legend -->
  <line x1="20" y1="650" x2="660" y2="650" stroke="#D3D1C7" stroke-width="0.5"/>
  <rect x="20" y="662" width="10" height="10" rx="2" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="36" y="671" font-size="10" fill="#5F5E5A">Seguridad</text>
  <rect x="110" y="662" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="126" y="671" font-size="10" fill="#5F5E5A">Monitoreo</text>
  <rect x="210" y="662" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="226" y="671" font-size="10" fill="#5F5E5A">Red y cifrado</text>
  <rect x="320" y="662" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="336" y="671" font-size="10" fill="#5F5E5A">Computo</text>
  <rect x="410" y="662" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="426" y="671" font-size="10" fill="#5F5E5A">Red publica</text>
  <rect x="500" y="662" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="516" y="671" font-size="10" fill="#5F5E5A">Almacenamiento</text>
</svg>
